<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>退款规则</title>
    <link rel="stylesheet" href="/assets/site.css" />
  </head>
  <body>
    <main>
      <nav class="nav">
        <div class="brand">
          <strong>退款规则</strong>
          <span>上线前请替换成你的正式售后条款</span>
        </div>
        <div class="nav-links">
          <a class="pill" href="/">首页</a>
          <a class="pill" href="/purchase">购买</a>
        </div>
      </nav>

      <section class="policy-grid section">
        <article class="policy-card">
          <h3>时长型许可证</h3>
          <p>建议对“未激活”或“因服务端原因导致无法激活”的订单提供退款；已成功激活且正常使用的订单不建议无条件退款。</p>
        </article>
        <article class="policy-card">
          <h3>永久版</h3>
          <p>建议设置较短的退款窗口，并要求退款前同步释放许可证，避免退款后继续使用已交付的授权。</p>
        </article>
        <article class="policy-card">
          <h3>人工售后</h3>
          <p>换机、误购、重复购买等特殊情况，建议统一通过支持邮箱处理，并要求用户提供订单号、买家 ID 和许可证号。</p>
        </article>
        <article class="policy-card">
          <h3>正式上线前请补齐</h3>
          <p>请根据你的主体、发票、支付通道和本地法律要求补充最终退款规则，不要直接把模板页拿去开卖。</p>
        </article>
      </section>
    </main>
    <script src="/assets/site.js" defer></script>
  </body>
</html>
