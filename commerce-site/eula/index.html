<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EULA</title>
    <link rel="stylesheet" href="/assets/site.css" />
  </head>
  <body>
    <main>
      <nav class="nav">
        <div class="brand">
          <strong>EULA</strong>
          <span>上线前请替换成你的正式最终用户许可协议</span>
        </div>
        <div class="nav-links">
          <a class="pill" href="/">首页</a>
          <a class="pill" href="/purchase">购买</a>
        </div>
      </nav>

      <section class="policy-grid section">
        <article class="policy-card">
          <h3>授权范围</h3>
          <p>每个订单默认只发 1 个许可证，除非你单独提供多设备授权。未经许可，不得转售、分享或公开分发许可证。</p>
        </article>
        <article class="policy-card">
          <h3>设备激活</h3>
          <p>许可证与设备标识关联。用户可先停用旧设备后再迁移到新设备；恶意共享或绕过校验的许可证可被停用。</p>
        </article>
        <article class="policy-card">
          <h3>更新与支持</h3>
          <p>首发阶段通过下载页分发更新。不同 SKU 是否包含后续版本更新、支持时长或托管权益，以你的正式购买页说明为准。</p>
        </article>
        <article class="policy-card">
          <h3>托管服务边界</h3>
          <p>如果你销售的是带托管能力的软件，请明确说明托管服务是否有时长、额度、设备和公平使用限制，尤其是永久版的托管边界。</p>
        </article>
      </section>
    </main>
    <script src="/assets/site.js" defer></script>
  </body>
</html>
